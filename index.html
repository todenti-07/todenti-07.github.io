<!DOCTYPE html>

     <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        .contenedor {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            height: 100vh;  
            grid-auto-rows: 1fr; 
            gap: 10px;
            padding: 10px;
            box-sizing: border-box;
        }

        /* base */
        .contenedor li{
            list-style: none;
            color: white;
            font-weight: bold;
            padding: 15px;
        }
		
		.contenedor li:hover {
			transform: scale(1.03);
			transition: 0.2s;
			cursor: pointer;
		}
		
		.contenedor li a {
			display: block;
			width: 100%;
			height: 100%;
			color: inherit;
			text-decoration: none;
			display: flex;
			align-items: center;
			justify-content: center;
			font-family: "Arial", sans-serif;
		}

        /* tamaños tipo pinterest */
        .grande {
            grid-column: span 2;
            grid-row: span 2;
        }

        .ancho {
            grid-column: span 2;
        }

        .alto {
            grid-row: span 2;
        }

        /* colores solo ejemplo */
        .azul { background: #2f3e55; }
        .amarillo { background: #e7c04d; color: black; }
        .celeste { background: #46b3c2; }
        .naranja { background: #ff4d1a; }
        .verde { background: #a8d60f; color: black; }
        .negro { background: #111; }
        .morado { background: #a896c8; }
        .rosa { background: #8a1f52; }
