<script>
	  let count = 0;

	  function clickOnSpot() {
		const button = document.getElementById("button");
		count++;

		button.value = count;

		// Tamaño base + crecimiento
		let size = 20 + count * 5; // píxeles
		button.style.width = size + "px";
		button.style.height = size + "px";
	  }
